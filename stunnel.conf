; stunnel configuration for sbcl-ircd TLS termination
; Terminates TLS on port 6697 and forwards plaintext to the Lisp daemon on 127.0.0.1:6667

foreground = yes
debug = info
syslog = no

[ircd-tls]
accept = 6697
connect = 127.0.0.1:6667
cert = cert.pem
key = key.pem
; Enforce TLS 1.2 minimum.
sslVersionMin = TLSv1.2
; Use strong cipher suite ordering
ciphers = ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256
